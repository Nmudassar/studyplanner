<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://kit.fontawesome.com/62d2ea7a17.js"
            crossorigin="anonymous"></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
        <div class="logo">
            <h1>Study Planner</h1> 
            <p>Plan smart, Study better</p>
        </div>
        <i class="fa-solid fa-bars menu-btn"></i>
        <ul class="nav-list">
            <li class="search-box"> 
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(84, 11, 239);"></i>           
                <input type="text" placeholder="Search...">
            </li>
            <li>
                <i class="fa-regular fa-calendar" style="color: rgb(84, 11, 239);"></i>
                <a href="#">Calendar</a> 
            </li>
            <li>
                <i class="fa-solid fa-chart-line" style="color: rgb(84, 11, 239);"></i>
                <a href="#">Activites</a>
            </li>
            <li>
                <i class="fa-solid fa-hourglass-half" style="color: rgb(84, 11, 239);"></i>
                <a href="#">Focus</a>
            </li>
            <li>
                <i class="fa-regular fa-circle-question" style="color: rgb(84, 11, 239);"></i>
                <a href="#">FAQ</a>
            </li>
            <li>
                <i class="fa-solid fa-arrow-left-from-bracket" style="color: rgb(84, 11, 239);"></i>
                <a href="#">Logout</a>
            </li>
        </ul>
    </aside>
  </div>

    
</body>
</html>
