<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel= "stylesheet" href="assets/css/01-global.css">
    <link rel="stylesheet" href="assets/css/05-login.css">
    <script src="https://kit.fontawesome.com/62d2ea7a17.js"        crossorigin="anonymous"></script>

</head>
<body>
    <div class="wrapper">
        <h1>Sign Up / Login</h1>
        <form>
            <div>  <!---this conatiner is position each icon will next to it ----->
                <i class="fa-solid fa-user"></i>
                <input type="text" name="Firstname" id="firstname-input" placeholder="Firstname">
            </div>
            <div>  
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="Email" id="email-input" placeholder="Email">
            </div>
            <div> 
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="passsword" id="password-input" placeholder="Password">
            </div>
            <div> 
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="repeat-passsword" id="repeat-password-input" placeholder="Password">
            </div>
            <div class="btn-field">
                <button type="button" id="signupBtn">Sign Up</button>
                <button type="button" id="loginBtn" class="disable">LogIn</button>
            </div>
        </form>
        <p>Lost password? <a href="#">Click here</a>
        </p>
    </div>
    
</body>
</html>
