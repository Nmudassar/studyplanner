<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tasks</title>

    <link rel="stylesheet" href="assets/css/01-global.css" />

    <link rel="stylesheet" href="assets/css/03-responsive.css" />

    <link rel="stylesheet" href="assets/css/08-tasks.css" />

    <script
      src="https://kit.fontawesome.com/62d2ea7a17.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="layout">
      <!-- ================= Sidebar ================= -->
      <aside class="sidebar">
        <div class="logo-details">
          <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>

            <div class="logo-name">Study<span>Smart</span></div>
          </div>
        </div>

        <nav>
          <a href="02-dashboard.html"> Dashboard </a>

          <a href="03-subjects.html"> Subjects </a>

          <a href="05-tasks.html" class="active"> Tasks </a>

          <a href="07-calendar.html"> Calendar </a>

          <a href="11-pomodoro-settings.html"> Focus Timer </a>
        </nav>
      </aside>

      <!-- ================= Main Content ================= -->
      <main class="main-content">
        <!-- ================= Top Bar ================= -->
        <header class="top-bar">
          <div class="task-search">
            <i class="fa-solid fa-magnifying-glass"></i>

            <input
              type="search"
              id="taskSearch"
              placeholder="Search tasks..."
              autocomplete="off"
            />
          </div>

          <div class="user-actions">
            <button
              type="button"
              class="notification-button"
              aria-label="View notifications"
            >
              <i class="fa-regular fa-bell"></i>

              <span class="notification-badge">3</span>
            </button>

            <a
              href="01-login.html"
              class="user-avatar"
              aria-label="Go to login page"
            >
              <i class="fa-solid fa-user"></i>
            </a>
          </div>
        </header>
      </main>
    </div>
  </body>
</html>
