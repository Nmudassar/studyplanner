                    <body>

                        <div class="setting-container">

                            <!-- Page Heading -->
                            <h1>Pomodoro Settings</h1>

                            <p>
                                Set your preferred focus and break durations for the Pomodoro

                            </p>

                            <!-- Settings Grid -->
                            <div class="settings-grid">

                                <!-- Focus Time -->
                                <div class="setting-card">

                                    <label for="focusTime">Focus Time</label>

                                    <select id="focusTime">
                                        <option value="25">25 Minutes</option>
                                        <option value="30">30 Minutes</option>
                                        <option value="45">45 Minutes</option>
                                        <option value="60">60 Minutes</option>
                                    </select>

                                </div>

                                <!-- Short Break -->
                                <div class="setting-card">

                                    <label for="shortBreak">Short Break</label>

                                    <select id="shortBreak">
                                        <option value="5">5 Minutes</option>
                                        <option value="10">10 Minutes</option>
                                        <option value="15">15 Minutes</option>
                                    </select>

                                </div>

                                <!-- Long Break -->
                                <div class="setting-card">

                                    <label for="longBreak">Long Break</label>

                                    <select id="longBreak">
                                        <option value="20">20 Minutes</option>
                                        <option value="25">25 Minutes</option>
                                        <option value="30">30 Minutes</option>
                                    </select>

                                </div>

                                <!-- Long Break Interval -->
                                <div class="setting-card">

                                    <label for="interval">Long Break Interval</label>

                                    <select id="interval">
                                        <option value="2">2 Sessions</option>
                                        <option value="4" selected>4 Sessions</option>
                                        <option value="6">6 Sessions</option>
                                    </select>

                                </div>

                            </div>

                            <!-- Alert Sound -->
                            <div class="sound-box">

                                <label>

                                    <input type="checkbox" id="alertSound" checked>

                                    Enable Alert Sound

                                </label>

                            </div>

                            <!-- Buttons -->
                            <div class="button-group">

                                <button class="save-btn" id="savePomodoro">
                                    Save
                                </button>

                                <button class="cancel-btn" id="cancelPomodoro">
                                    Cancel
                                </button>

                            </div>

                        </div>

                        <script src="assets/js/pomodoro-settings.js"></script>
