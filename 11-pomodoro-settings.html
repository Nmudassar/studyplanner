<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Settings</title>

    <link rel="stylesheet" href="assets/css/01-global.css">
    <link rel="stylesheet" href="assets/css/10-pomodoro.css">
</head>

<body>

    <div class="setting-container">

        <h1>Pomodoro Settings</h1>

        <p>
            Set your preferred focus and break durations for the Pomodoro technique.
        </p>

        <div class="settings-grid">

            <div class="setting-card">
                <label for="focusTime">Focus Time</label>
                <select id="focusTime">
                    <option value="25">25 Minutes</option>
                    <option value="30">30 Minutes</option>
                    <option value="45">45 Minutes</option>
                    <option value="60">60 Minutes</option>
                </select>
            </div>

            <div class="setting-card">
                <label for="shortBreak">Short Break</label>
                <select id="shortBreak">
                    <option value="5">5 Minutes</option>
                    <option value="10">10 Minutes</option>
                    <option value="15">15 Minutes</option>
                </select>
            </div>

            <div class="setting-card">
                <label for="longBreak">Long Break</label>
                <select id="longBreak">
                    <option value="20">20 Minutes</option>
                    <option value="25">25 Minutes</option>
                    <option value="30">30 Minutes</option>
                </select>
            </div>

            <div class="setting-card">
                <label for="interval">Long Break Interval</label>
                <select id="interval">
                    <option value="2">2 Sessions</option>
                    <option value="4" selected>4 Sessions</option>
                    <option value="6">6 Sessions</option>
                </select>
            </div>

        </div>

        <div class="sound-box">
            <label>
                <input type="checkbox" id="alertSound" checked>
                Enable Alert Sound
            </label>
        </div>

        <div class="button-group">
            <button class="save-btn" id="savePomodoro">Save</button>
            <button class="cancel-btn" id="cancelPomodoro">Cancel</button>
        </div>

    </div>

    <script src="assets/js/pomodoro-setting.js"></script>

</body>

</html>
